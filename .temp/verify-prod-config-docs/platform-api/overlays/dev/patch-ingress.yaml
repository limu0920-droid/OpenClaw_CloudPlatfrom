apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-platform-api
spec:
  rules:
    - host: api.dev.openclaw.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw-platform-api
                port:
                  number: 80


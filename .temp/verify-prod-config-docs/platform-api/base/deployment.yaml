apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-platform-api
  labels:
    app.kubernetes.io/name: openclaw-platform-api
    app.kubernetes.io/part-of: openclaw-platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-platform-api
        app.kubernetes.io/part-of: openclaw-platform
    spec:
      serviceAccountName: openclaw-platform-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: api
          image: ghcr.io/openclaw/platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: openclaw-platform-api-config
            - secretRef:
                name: openclaw-platform-api-secret
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi


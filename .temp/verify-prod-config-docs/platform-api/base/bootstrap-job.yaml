apiVersion: batch/v1
kind: Job
metadata:
  name: openclaw-platform-api-bootstrap
  labels:
    app.kubernetes.io/name: openclaw-platform-api
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-platform-api-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openclaw-platform-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: bootstrap
          image: ghcr.io/openclaw/platform-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/platform-api-bootstrap
          envFrom:
            - configMapRef:
                name: openclaw-platform-api-config
            - secretRef:
                name: openclaw-platform-api-secret
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL


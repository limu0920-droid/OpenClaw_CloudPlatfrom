apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: openclaw-platform-api
  namespace: openclaw-system
  labels:
    app.kubernetes.io/name: openclaw-platform-api
spec:
  groups:
    - name: openclaw-platform-api
      rules:
        - alert: OpenClawMockApiUnavailable
          expr: up{job="openclaw-platform-api"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: openclaw-platform-api is unavailable
            description: All openclaw-platform-api targets are down for more than 2 minutes.
        - alert: OpenClawMockApiHighErrorRate
          expr: |
            (
              sum(rate(openclaw_http_requests_total{status=~"Internal Server Error|Bad Gateway|Unauthorized"}[5m]))
              /
              clamp_min(sum(rate(openclaw_http_requests_total[5m])), 1)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: openclaw-platform-api high error rate
            description: HTTP error ratio exceeds 5% for 10 minutes.
        - alert: OpenClawMockApiP95LatencyHigh
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(openclaw_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: openclaw-platform-api p95 latency high
            description: P95 request latency is above 1 second for 10 minutes.


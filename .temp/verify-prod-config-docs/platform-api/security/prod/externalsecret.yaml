        key: "/openclaw/platform-api/prod/cn-east-1/prod-cn-east-1-a/default/KEYCLOAK_CLIENT_SECRET"
    - secretKey: KEYCLOAK_SESSION_SECRET
      remoteRef:
        key: "/openclaw/platform-api/prod/cn-east-1/prod-cn-east-1-a/default/KEYCLOAK_SESSION_SECRET"
    - secretKey: OPENSEARCH_USERNAME
      remoteRef:
        key: "/openclaw/platform-api/prod/cn-east-1/prod-cn-east-1-a/default/OPENSEARCH_USERNAME"
    - secretKey: OPENSEARCH_PASSWORD
      remoteRef:

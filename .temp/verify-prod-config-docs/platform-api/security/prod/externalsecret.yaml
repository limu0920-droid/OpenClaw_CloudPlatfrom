apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-platform-api-secret
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openclaw-vault-prod
  target:
    name: openclaw-platform-api-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: "/openclaw/platform-api/prod/cn-east-1/prod-cn-east-1-a/default/DATABASE_URL"
    - secretKey: OBJECT_STORAGE_ACCESS_KEY
      remoteRef:
        key: "/openclaw/platform-api/prod/cn-east-1/prod-cn-east-1-a/default/OBJECT_STORAGE_ACCESS_KEY"

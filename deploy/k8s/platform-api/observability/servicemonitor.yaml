apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openclaw-platform-api
  namespace: openclaw-system
  labels:
    app.kubernetes.io/name: openclaw-platform-api
spec:
  namespaceSelector:
    matchNames:
      - openclaw-system
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-platform-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s


apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-platform-api
  labels:
    app.kubernetes.io/name: openclaw-platform-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw-platform-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openclaw-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openclaw-system
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9200
        - protocol: TCP
          port: 8080

